/* VERİ DEPOLAMA — Sunucu üzerinden otomatik kayıt, tüm tarayıcılar aynı veriyi görür */
let _saveTimer=null;
function loadDB(){return defaultDB;} /* İlk yükleme — sunucudan veri useEffect ile gelecek */
function saveDB(db){
  /* Debounced: Her değişiklikte 300ms bekle, sonra sunucuya kaydet */
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(db)}).catch(()=>{});
  },300);
}

/* EDITABLE LIST */
function EditableList({title,items,onAdd,onDelete,onEdit,canAdd,canEdit,canDel}){
  const [val,setVal]=useState("");
  const [editId,setEditId]=useState(null);
  const [editVal,setEditVal]=useState("");
  return <div style={{background:C.card,borderRadius:12,padding:"20px 24px",border:"1px solid "+C.cardBrd}}>
    <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{title}</div>
    {canAdd!==false&&<div style={{display:"flex",gap:8,marginBottom:14}}>
      <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&val.trim()){onAdd(val.trim());setVal("");}}} placeholder="Yeni ekle..." style={{flex:1}}/>
      <button onClick={()=>{if(val.trim()){onAdd(val.trim());setVal("");}}} style={{width:36,height:40,background:C.teal,border:"none",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}><IcPlus/></button>
    </div>}
    {items.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<items.length-1?"1px solid "+C.brdLt:"none"}}>
      {editId===i?<div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}>
        <input value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onEdit(i,editVal);setEditId(null);}}} style={{flex:1,padding:"6px 10px",fontSize:13}} autoFocus/>
        <button onClick={()=>{onEdit(i,editVal);setEditId(null);}} style={{background:"none",border:"none",cursor:"pointer",color:C.grn}}><IcCheck/></button>
        <button onClick={()=>setEditId(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.red}}><IcX/></button>
      </div>:<>
        <span style={{fontSize:13}}>{item}</span>
        <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
          {canEdit!==false&&<button onClick={()=>{setEditId(i);setEditVal(item);}} style={{background:"none",border:"none",cursor:"pointer"}}><IcEdit/></button>}
          {canDel!==false&&<button onClick={()=>onDelete(i)} style={{background:"none",border:"none",cursor:"pointer"}}><IcTrash/></button>}
        </span>
      </>}
    </div>)}
    {items.length===0&&<div style={{fontSize:12,color:C.mut,textAlign:"center",padding:12}}>Henüz kayıt yok</div>}
  </div>;
}

function Login({users,onLogin}){
  const [name,setName]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const handle=()=>{const u=users.find(x=>x.name===name&&x.pass===pass);if(u){onLogin(u);}else{setErr("Kullanıcı adı veya parola hatalı!");}};

      <div style={{padding:"40px 48px 36px",textAlign:"center"}}>

        <div style={{fontSize:13,color:C.mut,letterSpacing:"0.15em",marginBottom:32,textTransform:"uppercase"}}>İnsan Kaynakları v3.0</div>
        <div style={{textAlign:"left",marginBottom:18}}>
          <div style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Kullanıcı Kodu</div>

          <div style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Parola</div>

        </div>
        {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,textAlign:"left"}}>{err}</div>}
        <Btn full bg={C.teal} onClick={handle} style={{padding:14,fontSize:15,borderRadius:10,marginTop:8}}><IcLock/> Sistemi Aç</Btn>
        <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid #eee"}}>
          <button onClick={()=>{if(confirm("Tüm veriler sıfırlanacak ve varsayılan ayarlara dönülecek. Emin misiniz?")){fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"}).then(()=>window.location.reload());}}} style={{background:"none",border:"none",color:C.mut,fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Veritabanını Sıfırla</button>
        </div>
      </div>
    </div>
  </div>;
}

/* MAIN APP */
function App(){
  const [db,setDbRaw]=useState(loadDB);
  const [loading,setLoading]=useState(true);
  const [curUser,setCurUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [sideOpen,setSideOpen]=useState(true);
  /* GLOBAL FILTER STATES - persist across re-renders */
  const [pSearch,setPSearch]=useState("");const [pFirma,setPFirma]=useState("");const [pSube,setPSube]=useState("");
  const [ptSearch,setPtSearch]=useState("");const [ptF,setPtF]=useState("");const [ptS,setPtS]=useState("");const [ptDs,setPtDs]=useState([]);const [ptDurDrop,setPtDurDrop]=useState(false);const [selCell,setSelCell]=useState(null);
  const [bFirma,setBFirma]=useState("");const [bSube,setBSube]=useState("");
  const [bulkPt,setBulkPt]=useState({show:false,code:"X",dayStart:1,dayEnd:31,sebep:"",saat:1});
  const fileRef=useRef();
  const ptSearchRef=useRef();

  /* Sunucudan veri yükle — uygulama açıldığında bir kez çalışır */
  useEffect(()=>{
    fetch("/api/data").then(r=>r.json()).then(data=>{
      setDbRaw({...defaultDB,...data});
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const setDb=(updater,logEntry)=>{setDbRaw(prev=>{const next=typeof updater==="function"?updater(prev):{...prev,...updater};if(logEntry&&curUser){const log={id:Date.now(),ts:new Date().toISOString(),user:curUser.name,role:curUser.role,...logEntry};next.logs=[log,...(next.logs||[])].slice(0,500);}saveDB(next);return next;});};
  const addLog=(action,detail)=>({action,detail});
  const D=db;

  /* Kullanıcı DB'den güncellendiğinde curUser'ı senkronize et */
  useEffect(()=>{
    if(curUser){
      const latest=D.users.find(u=>u.id===curUser.id);
      if(latest&&JSON.stringify(latest)!==JSON.stringify(curUser))setCurUser(latest);
    }
  },[D.users]);
  /* Giriş yapıldığında log tut */
  const prevUserRef=useRef(null);
  useEffect(()=>{
    if(curUser&&!prevUserRef.current){
      setDbRaw(prev=>{const log={id:Date.now(),ts:new Date().toISOString(),user:curUser.name,role:curUser.role,action:"Giriş Yapıldı",detail:"Sisteme giriş yapıldı"};const next={...prev,logs:[log,...(prev.logs||[])].slice(0,500)};saveDB(next);return next;});
    }
    prevUserRef.current=curUser;
  },[curUser]);
  const sortedEmps=useMemo(()=>[...D.employees].sort((a,b)=>a.name.localeCompare(b.name,"tr")),[D.employees]);
  const activeEmps=sortedEmps.filter(e=>e.durum!=="K");
  const empName=(id)=>{const e=D.employees.find(x=>x.id===id);return e?e.name:"?";};

  /* PERMISSIONS */
  function can(perm,mod){
    if(!curUser)return false;
    if(curUser.role==="admin")return true;
    const p=curUser.perms;
    return p&&p[mod||page]&&p[mod||page][perm];
  }

  /* FIRMA/ŞUBE YETKİ FİLTRESİ */
  function canAccessEmp(emp){
    if(!curUser)return false;
    if(curUser.role==="admin")return true;
    const uf=curUser.firmalar||[];
    const us=curUser.subeler||[];
    if(uf.length>0&&!uf.includes(emp.firma))return false;
    if(us.length>0&&!us.includes(emp.sube))return false;
    return true;
  }
  const userFirms=useMemo(()=>{
    if(!curUser||curUser.role==="admin")return D.firms;
    const uf=curUser.firmalar||[];
    return uf.length>0?D.firms.filter(f=>uf.includes(f)):D.firms;
  },[D.firms,curUser]);
  const userSubs=useMemo(()=>{
    if(!curUser||curUser.role==="admin")return D.subs;
    const us=curUser.subeler||[];
    return us.length>0?D.subs.filter(s=>us.includes(s)):D.subs;
  },[D.subs,curUser]);
  const filteredSortedEmps=useMemo(()=>sortedEmps.filter(canAccessEmp),[sortedEmps,curUser]);
  const filteredActiveEmps=filteredSortedEmps.filter(e=>e.durum!=="K");

  /* PUANTAJ HELPERS — DİNAMİK DÖNEM */
  const now=new Date();
  const [pYear,setPYear]=useState(now.getFullYear());
  const [pMonth,setPMonth]=useState(now.getMonth());
  const pDays=new Date(pYear,pMonth+1,0).getDate();
  const months=["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
  const donemLabel=months[pMonth]+" "+pYear;
  const donemKey=pYear+"-"+String(pMonth+1).padStart(2,"0");
  function prevDonemKey(){const pm=pMonth===0?11:pMonth-1;const py=pMonth===0?pYear-1:pYear;return py+"-"+String(pm+1).padStart(2,"0");}
  function nextDonemKey(){const nm=pMonth===11?0:pMonth+1;const ny=pMonth===11?pYear+1:pYear;return ny+"-"+String(nm+1).padStart(2,"0");}
  function goPrev(){if(pMonth===0){setPMonth(11);setPYear(pYear-1);}else setPMonth(pMonth-1);}
  function goNext(){if(pMonth===11){setPMonth(0);setPYear(pYear+1);}else setPMonth(pMonth+1);}
  /* Dönem bazlı key oluşturucular */
  function pKey(empId,day){return donemKey+"|"+empId+"-"+day;}
  function bKey(empId){return donemKey+"|"+empId;}
  const izinDowMap={"Pazar":[0],"Pazartesi":[1],"Salı":[2],"Çarşamba":[3],"Perşembe":[4],"Cuma":[5],"Cumartesi":[6],"CP":[0,6]};
  function isIzinDay(emp,day){const dows=izinDowMap[emp.izin]||[0];return dows.includes(new Date(pYear,pMonth,day).getDay());}
  function isHolidayDay(day){const ds=pYear+"-"+String(pMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");return D.holidays.some(h=>ds>=h.s&&ds<=h.e);}
  function hasYiLeave(eId,day){const ds=pYear+"-"+String(pMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");return D.leaves.some(l=>l.empId===eId&&l.type==="Yİ"&&ds>=l.start&&ds<=l.end);}
  function getCellCode(eId,day){const key=pKey(eId,day);if(D.puantajCells[key])return D.puantajCells[key];const emp=D.employees.find(e=>e.id===eId);if(!emp)return "";if(isHolidayDay(day))return "RT";if(hasYiLeave(eId,day)&&!isIzinDay(emp,day))return "Yİ";return "";}
  function getPSummary(emp){let mesai=0,fmC=0,saatT=0,yiC=0,rtC=0,ayr=0;for(let d=1;d<=pDays;d++){const code=getCellCode(emp.id,d);const izin=isIzinDay(emp,d);const isRT=isHolidayDay(d);if(code==="."){ayr++;continue;}if(isRT){if(code==="X"||code==="FM"||code==="S"||code==="/")rtC++;}else if(izin){if(code==="X"||code==="FM"||code==="S")mesai++;if(code==="/")mesai+=0.5;}else{if(code==="-"||code==="M"||code==="R"||code==="H")mesai--;if(code==="/")mesai-=0.5;}if(code==="FM")fmC++;if(code==="S")saatT+=(D.puantajSaat[pKey(emp.id,d)]||0);if(code==="Yİ")yiC++;}const gun=Math.max(0,30+Math.min(0,mesai)-ayr);return{saat:saatT,mesai,fm:fmC,yi:yiC,rt:rtC,gun,ayr};}

  /* BORDRO */
  function isKapali(firma,sube){return !!D.bordroKapali[donemKey+"|"+firma+"|"+sube];}
  function isEmpKapali(emp){return isKapali(emp.firma,emp.sube);}
  const bordroData=useMemo(()=>filteredActiveEmps.map(emp=>{
    const ps=getPSummary(emp);
    const snapKey=bKey(emp.id);
    const snap=D.bordroSnapshot[snapKey];
    const kapali=isEmpKapali(emp);
    const maas=kapali&&snap?Number(snap.maas):Number(emp.maas);
    const yol=kapali&&snap?Number(snap.yol):Number(emp.yol);
    const avans1=kapali&&snap?Number(snap.sabitAvans)||0:Number(emp.sabitAvans)||0;
    const gunlukUcret=maas/30;const saatUcreti=gunlukUcret/7.5;
    const mesaiT=(ps.saat*saatUcreti)+(ps.mesai*gunlukUcret)+(ps.fm*gunlukUcret)+(ps.rt*gunlukUcret);
    const gunOrani=Math.min(ps.gun,30)/30;
    const maasT=(maas*gunOrani)+(yol*gunOrani)+mesaiT;
    const m=D.bordroManual[bKey(emp.id)]||{};
    const banka=Number(m.banka)||0;const bes=Number(m.bes)||0;const odenen=Number(m.odenen)||0;
    /* Avansları dönem tarihine göre filtrele */
    const dStart=donemKey+"-01";const dEnd=donemKey+"-"+String(pDays).padStart(2,"0");
    const ea=D.avanslar.filter(a=>a.empId===emp.id&&a.date>=dStart&&a.date<=dEnd);
    const a2=ea.filter(a=>a.type==="Avans").reduce((s,a)=>s+a.amount,0);
    const ur=ea.filter(a=>a.type==="Ürün").reduce((s,a)=>s+a.amount,0);
    const ke=ea.filter(a=>a.type==="Maaş Haczi"||a.type==="İcra").reduce((s,a)=>s+a.amount,0);
    const devirPlus=ea.filter(a=>a.type==="Devir+").reduce((s,a)=>s+a.amount,0);
    const devirMinus=ea.filter(a=>a.type==="Devir-").reduce((s,a)=>s+a.amount,0);
    const yatan=banka-bes-avans1-ke;
    const elden=maasT-banka;
    /* Devir: Bu dönem için kaydedilmiş devir (önceki dönemden aktarılan kalan) */
    const devir=(Number(D.bordroDevir[bKey(emp.id)])||0)+devirPlus-devirMinus;
    const kalan=elden+devir-a2-ur-odenen;
    return{emp,gun:ps.gun,saat:ps.saat,mesai:ps.mesai,fmVal:ps.fm,rtVal:ps.rt,mesaiT,maas,yol,maasT,banka,bes,avans1,a2,ur,ke,yatan,elden,devir,odenen,kalan};
  }),[filteredActiveEmps,D.avanslar,D.puantajCells,D.puantajSaat,D.bordroManual,D.bordroDevir,D.bordroSnapshot,D.bordroKapali,pYear,pMonth]);

  /* BACKUP / RESTORE */
  async function handleBackup(){
    const content=JSON.stringify(D,null,2);const blob=new Blob([content],{type:"application/json"});
    const fname="erdemce_yedek_"+new Date().toISOString().slice(0,10)+".json";
    if(window.showSaveFilePicker){
      try{const fh=await window.showSaveFilePicker({suggestedName:fname,types:[{description:"JSON Dosyası",accept:{"application/json":[".json"]}}]});const ws=await fh.createWritable();await ws.write(blob);await ws.close();alert("Yedek başarıyla kaydedildi!");}catch(e){if(e.name!=="AbortError")alert("Kaydetme hatası: "+e.message);}
    }else{const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);}
  }
  function handleRestore(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const data=JSON.parse(ev.target.result);setDb(prev=>({...defaultDB,...data}),addLog("Yedek Yüklendi",file.name));alert("Yedek başarıyla yüklendi!");}catch(err){alert("Geçersiz dosya!");}};reader.readAsText(file);}

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 30% 50%,#1a3c3c 0%,#162c30 40%,#0f1e22 100%)"}}><div style={{textAlign:"center",color:"#fff"}}><div style={{fontFamily:"Georgia,serif",fontSize:36,fontStyle:"italic",marginBottom:16,opacity:.7}}>erdemCe</div><div style={{fontSize:14,opacity:.5}}>Veriler yükleniyor...</div></div></div>;

  if(!curUser)return <Login users={D.users} onLogin={setCurUser}/>;

  /* LIST OPS */
  const listOps=(field)=>({
    onAdd:(v)=>setDb(p=>({...p,[field]:[...p[field],v]}),addLog("Tanım Eklendi",field+": "+v)),
    onDelete:(i)=>{const val=D[field][i];setDb(p=>({...p,[field]:p[field].filter((_,idx)=>idx!==i)}),addLog("Tanım Silindi",field+": "+val));},
    onEdit:(i,v)=>{const old=D[field][i];setDb(p=>{const n=[...p[field]];n[i]=v;return{...p,[field]:n};},addLog("Tanım Düzenlendi",field+": "+old+" → "+v));},
  });

  /* ===== PAGES ===== */

  /* DASHBOARD */
  function DashboardPage(){
    const [dFirma,setDFirma]=useState("");
    const [dSube,setDSube]=useState("");
    const [dBolum,setDBolum]=useState("");
    /* Filtrelenmiş personel */
    const dEmps=filteredActiveEmps.filter(e=>{
      if(dFirma&&e.firma!==dFirma)return false;
      if(dSube&&e.sube!==dSube)return false;
      if(dBolum&&e.bolum!==dBolum)return false;
      return true;
    });
    /* Filtrelenmiş bordro */
    const dBordro=bordroData.filter(b=>dEmps.some(e=>e.id===b.emp.id));
    /* Toplamlar */
    const tot={kisi:dEmps.length,maas:0,yol:0,mesaiT:0,maasT:0,banka:0,bes:0,avans1:0,ke:0,elden:0,devir:0,a2:0,ur:0,odenen:0,kalan:0};
    dBordro.forEach(b=>{tot.maas+=b.maas;tot.yol+=b.yol;tot.mesaiT+=b.mesaiT;tot.maasT+=b.maasT;tot.banka+=b.banka;tot.bes+=b.bes;tot.avans1+=b.avans1;tot.ke+=b.ke;tot.elden+=b.elden;tot.devir+=b.devir;tot.a2+=b.a2;tot.ur+=b.ur;tot.odenen+=b.odenen;tot.kalan+=b.kalan;});
    /* Firma bazlı özet */
    const firmaOzet={};dBordro.forEach(b=>{const f=b.emp.firma||"Belirtilmemiş";if(!firmaOzet[f])firmaOzet[f]={kisi:0,maasT:0,elden:0,kalan:0,a2:0};firmaOzet[f].kisi++;firmaOzet[f].maasT+=b.maasT;firmaOzet[f].elden+=b.elden;firmaOzet[f].kalan+=b.kalan;firmaOzet[f].a2+=b.a2;});
    /* Şube bazlı özet */
    const subeOzet={};dBordro.forEach(b=>{const s=b.emp.sube||"Belirtilmemiş";if(!subeOzet[s])subeOzet[s]={kisi:0,maasT:0,elden:0,kalan:0,a2:0};subeOzet[s].kisi++;subeOzet[s].maasT+=b.maasT;subeOzet[s].elden+=b.elden;subeOzet[s].kalan+=b.kalan;subeOzet[s].a2+=b.a2;});
    /* Bölüm bazlı özet */
    const bolumOzet={};dBordro.forEach(b=>{const bl=b.emp.bolum||"Belirtilmemiş";if(!bolumOzet[bl])bolumOzet[bl]={kisi:0,maasT:0,elden:0,kalan:0,a2:0};bolumOzet[bl].kisi++;bolumOzet[bl].maasT+=b.maasT;bolumOzet[bl].elden+=b.elden;bolumOzet[bl].kalan+=b.kalan;bolumOzet[bl].a2+=b.a2;});
    /* Özet kartlar */
    const totalAvans=D.avanslar.filter(a=>{const dStart=donemKey+"-01";const dEnd=donemKey+"-31";return a.type==="Avans"&&a.date>=dStart&&a.date<=dEnd&&dEmps.some(e=>e.id===a.empId);}).reduce((s,a)=>s+a.amount,0);
    const stats=[
      {Ic:IcUsers,l:"Aktif Personel",v:String(tot.kisi),cl:C.teal},
      {Ic:IcTable,l:"Maaş Toplam",v:fmt(tot.maasT)+" ₺",cl:"#2563eb"},
      {Ic:IcCard,l:"Elden Toplam",v:fmt(tot.elden)+" ₺",cl:"#16a34a"},
      {Ic:IcDoc,l:"Kalan Toplam",v:fmt(tot.kalan)+" ₺",cl:tot.kalan>=0?"#7c3aed":"#ef4444"}
    ];
    const ozTh={...thS,textAlign:"center"};
    const ozTd={...tdS,textAlign:"center",fontSize:12};
    function OzetTablo({title,data,icon}){
      const entries=Object.entries(data).sort((a,b)=>b[1].maasT-a[1].maasT);
      const t=entries.reduce((s,e)=>({kisi:s.kisi+e[1].kisi,maasT:s.maasT+e[1].maasT,elden:s.elden+e[1].elden,a2:s.a2+e[1].a2,kalan:s.kalan+e[1].kalan}),{kisi:0,maasT:0,elden:0,a2:0,kalan:0});
      return <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.cardBrd,overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid "+C.brd,display:"flex",alignItems:"center",gap:8}}>
          {icon}

        <table><thead><tr>
          <th style={thS}>{title.replace(" Bazlı Özet","")}</th>

          <th style={ozTh}>Elden</th>
          <th style={ozTh}>Avans</th>
          <th style={ozTh}>Kalan</th>
        </tr></thead><tbody>
          {entries.map(([k,v])=><tr key={k}>
            <td style={{...tdS,fontWeight:600}}>{k}</td>
            <td style={ozTd}>{v.kisi}</td>
            <td style={ozTd}>{fmt(v.maasT)}</td>
            <td style={{...ozTd,color:C.grn}}>{fmt(v.elden)}</td>
            <td style={{...ozTd,color:C.red}}>{v.a2>0?fmt(v.a2):"-"}</td>
            <td style={{...ozTd,fontWeight:700,color:v.kalan>=0?C.teal:C.red}}>{fmt(v.kalan)}</td>
          </tr>)}
          <tr style={{background:"#f0fdf4",fontWeight:700}}>
            <td style={{...tdS,fontWeight:800}}>TOPLAM</td>
            <td style={ozTd}>{t.kisi}</td>
            <td style={ozTd}>{fmt(t.maasT)}</td>
            <td style={{...ozTd,color:C.grn}}>{fmt(t.elden)}</td>
            <td style={{...ozTd,color:C.red}}>{t.a2>0?fmt(t.a2):"-"}</td>
            <td style={{...ozTd,fontWeight:800,color:t.kalan>=0?C.teal:C.red}}>{fmt(t.kalan)}</td>
          </tr>
        </tbody></table>
      </div>;
    }
    /* Yıllık İzinler — bu dönemde kullanılan */
    const dStart=pYear+"-"+String(pMonth+1).padStart(2,"0")+"-01";
    const dEnd=pYear+"-"+String(pMonth+1).padStart(2,"0")+"-"+String(pDays).padStart(2,"0");
    const ayIzinler=D.leaves.filter(l=>l.type==="Yİ"&&l.end>=dStart&&l.start<=dEnd&&dEmps.some(e=>e.id===l.empId));
    /* Doğum günleri — bu ay doğanlar */
    const ayDogum=dEmps.filter(e=>{if(!e.dogumGunu)return false;const p=e.dogumGunu.split("-");return p.length>=2&&Number(p[1])===(pMonth+1);}).sort((a,b)=>{const da=Number(a.dogumGunu.split("-")[2]||0);const db=Number(b.dogumGunu.split("-")[2]||0);return da-db;});
    function handleDashPrint(){
      const firmaL=dFirma||"TÜM FİRMALAR";const subeL=dSube?" / "+(dSube):"";const bolumL=dBolum?" / "+(dBolum):"";
      const css="*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:10px;padding:8mm;-webkit-print-color-adjust:exact;print-color-adjust:exact}table{width:100%;border-collapse:collapse;margin-bottom:12px}th,td{border:1px solid #aaa;padding:4px 6px;font-size:10px}th{background:#e8e8e8;font-weight:700;font-size:9px;text-align:center}td{text-align:center}td:first-child{text-align:left;font-weight:600}.hdr{text-align:center;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #333}.hdr h2{font-size:16px;margin-bottom:2px;font-weight:800;color:#333}.hdr h3{font-size:14px;font-weight:700;color:#555;margin-bottom:2px}.hdr h4{font-size:12px;color:#666}.tot{background:#f0fdf4;font-weight:700}.sec{font-size:12px;font-weight:800;background:#f8fafb;padding:8px 6px;border:1px solid #aaa;margin-bottom:0}.pos{color:#16a34a}.neg{color:#ef4444}.cards{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.card{flex:1;min-width:80px;border:1px solid #ccc;border-radius:6px;padding:6px 8px;text-align:center}.card .lbl{font-size:8px;color:#666;margin-bottom:2px}.card .val{font-size:13px;font-weight:800}.bday{color:#db2777}.izn{color:#dc2626}@page{size:A4 portrait;margin:8mm}";
      const w=window.open("","_blank");
      w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Özet Döküm</title><style>"+css+"</style></head><body>");
      w.document.write("<div class='hdr'><h2>"+donemLabel+"</h2><h3>"+firmaL+subeL+bolumL+"</h3><h4>ÖZET DÖKÜM</h4></div>");
      w.document.write("<div class='cards'>");
      [["Personel",tot.kisi],["Maaş T.",fmt(tot.maasT)],["Elden",fmt(tot.elden)],["Kalan",fmt(tot.kalan)],["Maaş",fmt(tot.maas)],["Yol",fmt(tot.yol)],["Mesai T.",fmt(tot.mesaiT)],["Avans1",fmt(tot.avans1)]].forEach(([l,v])=>{

      function writeOzet(title,data){
        const entries=Object.entries(data).sort((a,b)=>b[1].maasT-a[1].maasT);
        if(entries.length===0)return;
        const t=entries.reduce((s,e)=>({kisi:s.kisi+e[1].kisi,maasT:s.maasT+e[1].maasT,elden:s.elden+e[1].elden,a2:s.a2+e[1].a2,kalan:s.kalan+e[1].kalan}),{kisi:0,maasT:0,elden:0,a2:0,kalan:0});
        w.document.write("<div class='sec'>"+title+"</div>");
        w.document.write("<table><tr><th style='text-align:left'>"+title.split(" ")[0]+"</th><th>Kişi</th><th>Maaş T.</th><th>Elden</th><th>Avans</th><th>Kalan</th></tr>");
        entries.forEach(([k,v])=>{
          w.document.write("<tr><td>"+k+"</td><td>"+v.kisi+"</td><td>"+fmt(v.maasT)+"</td><td class='pos'>"+fmt(v.elden)+"</td><td class='neg'>"+(v.a2>0?fmt(v.a2):"-")+"</td><td style='font-weight:700'>"+fmt(v.kalan)+"</td></tr>");
        });
        w.document.write("<tr class='tot'><td>TOPLAM</td><td>"+t.kisi+"</td><td>"+fmt(t.maasT)+"</td><td class='pos'>"+fmt(t.elden)+"</td><td class='neg'>"+(t.a2>0?fmt(t.a2):"-")+"</td><td>"+fmt(t.kalan)+"</td></tr></table>");
      }

      /* Yıllık İzinler */

        ayIzinler.forEach(l=>{w.document.write("<tr><td class='izn'>"+empName(l.empId)+"</td><td>"+l.start+"</td><td>"+l.end+"</td><td>"+l.days+"</td><td style='font-weight:400'>"+(l.note||"-")+"</td></tr>");});
        w.document.write("</table>");
      }
      /* Doğum Günleri */
      if(ayDogum.length>0){
        w.document.write("<div class='sec'>Doğum Günleri ("+ayDogum.length+")</div>");
        w.document.write("<table><tr><th style='text-align:left'>Personel</th><th>Doğum Tarihi</th><th>Firma</th><th>Şube</th></tr>");
        ayDogum.forEach(e=>{const gun=e.dogumGunu.split("-")[2]||"";w.document.write("<tr><td class='bday'>"+e.name+"</td><td>"+gun+" "+months[pMonth]+"</td><td style='font-weight:400'>"+e.firma+"</td><td style='font-weight:400'>"+e.sube+"</td></tr>");});
        w.document.write("</table>");
      }
      w.document.write("</body></html>");
      w.document.close();setTimeout(()=>w.print(),400);
    }
    return <div>
      <Header icon={<IcGrid/>} title="Yönetim Paneli" sub={donemLabel+" dönemi özet rapor"} right={<Btn onClick={handleDashPrint}><IcPrint/> Döküm Al</Btn>}/>

        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,fontWeight:600,color:C.sec}}>Dönem:</span><span style={{fontSize:13,fontWeight:700,color:C.teal}}>{donemLabel}</span>

        </div>
        <select value={dFirma} onChange={e=>setDFirma(e.target.value)} style={{width:160}}><option value="">Tüm Firmalar</option>{userFirms.map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={dSube} onChange={e=>setDSube(e.target.value)} style={{width:160}}><option value="">Tüm Şubeler</option>{userSubs.map(s=><option key={s} value={s}>{s}</option>)}</select>
        <select value={dBolum} onChange={e=>setDBolum(e.target.value)} style={{width:160}}><option value="">Tüm Bölümler</option>{D.bols.map(b=><option key={b} value={b}>{b}</option>)}</select>
        <div style={{flex:1}}/>
        <span onClick={()=>{setDFirma("");setDSube("");setDBolum("");}} style={{color:C.teal,fontWeight:600,fontSize:13,cursor:"pointer"}}>Temizle</span>
      </div>
      {/* ÖZET KARTLAR */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:20}}>{stats.map((st,i)=><div key={i} style={{background:C.card,borderRadius:12,padding:"20px 24px",border:"1px solid "+C.cardBrd}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,color:st.cl,fontSize:13,fontWeight:500}}><st.Ic/> {st.l}</div><div style={{fontSize:28,fontWeight:800}}>{st.v}</div></div>)}</div>
      {/* DETAY ÖZET KARTLAR */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[["Maaş",fmt(tot.maas),C.txt],["Yol",fmt(tot.yol),C.sec],["Mesai T.",fmt(tot.mesaiT),C.pur],["Banka",fmt(tot.banka),"#a16207"],["BES",fmt(tot.bes),C.sec],["Avans1",fmt(tot.avans1),C.orange],["Kesinti",fmt(tot.ke),C.red],["Devir",fmt(tot.devir),C.blu]].map(([l,v,cl],i)=><div key={i} style={{background:C.card,borderRadius:10,padding:"12px 16px",border:"1px solid "+C.brdLt}}>
          <div style={{fontSize:11,color:C.sec,fontWeight:600,marginBottom:4}}>{l}</div>
          <div style={{fontSize:16,fontWeight:700,color:cl}}>{v} ₺</div>
        </div>)}
      </div>
      {/* ÖZET TABLOLAR */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
        <OzetTablo title="Firma Bazlı Özet" data={firmaOzet} icon={<IcFlag/>}/>
        <OzetTablo title="Şube Bazlı Özet" data={subeOzet} icon={<IcFlag/>}/>
      </div>
      <div style={{marginBottom:20}}>
        <OzetTablo title="Bölüm Bazlı Özet" data={bolumOzet} icon={<IcFlag/>}/>
      </div>
      {/* YILLIK İZİNLER VE DOĞUM GÜNLERİ */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
        {/* Yıllık İzinler */}
        <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.cardBrd,overflow:"hidden"}}>
          <div style={{padding:"14px 20px",borderBottom:"1px solid "+C.brd,display:"flex",alignItems:"center",gap:8}}>
            <IcDoc/>
            <span style={{fontSize:14,fontWeight:700}}>Yıllık İzinler</span>
            <span style={{fontSize:12,color:C.mut}}>({ayIzinler.length})</span>
          </div>
          {ayIzinler.length>0?<table><thead><tr>
            <th style={thS}>Personel</th><th style={{...thS,textAlign:"center"}}>Başlangıç</th><th style={{...thS,textAlign:"center"}}>Bitiş</th><th style={{...thS,textAlign:"center"}}>Gün</th>
          </tr></thead><tbody>
            {ayIzinler.map(l=><tr key={l.id}>
              <td style={{...tdS,fontWeight:600,color:"#dc2626"}}>{empName(l.empId)}</td>
              <td style={{...tdS,textAlign:"center",fontSize:12}}>{l.start}</td>
              <td style={{...tdS,textAlign:"center",fontSize:12}}>{l.end}</td>
              <td style={{...tdS,textAlign:"center",fontWeight:700}}>{l.days}</td>

        {/* Doğum Günleri */}
        <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.cardBrd,overflow:"hidden"}}>

            <span style={{fontSize:14,fontWeight:700}}>Doğum Günleri</span>
            <span style={{fontSize:12,color:C.mut}}>({ayDogum.length})</span>
          </div>
          {ayDogum.length>0?<table><thead><tr>
            <th style={thS}>Personel</th><th style={{...thS,textAlign:"center"}}>Gün</th><th style={{...thS,textAlign:"center"}}>Firma</th><th style={{...thS,textAlign:"center"}}>Şube</th>
          </tr></thead><tbody>
            {ayDogum.map(e=>{const gun=e.dogumGunu.split("-")[2]||"";return <tr key={e.id}>

              <td style={{...tdS,textAlign:"center",fontSize:12,color:C.sec}}>{e.firma}</td>

          </tbody></table>:<div style={{padding:24,textAlign:"center",color:C.mut,fontSize:13}}>Bu ay doğum günü olan personel yok</div>}

      </div>
      {/* HIZLI İŞLEMLER */}

    </div>;

  /* PERSONEL */
  function PersonelPage(){
    const empty={name:"",gorev:"",firma:"",sube:"",bolum:"",maas:0,yol:0,sabitAvans:0,izin:"Pazar",durum:"S",iseGiris:"",istenCikis:"",kidem:"",dogumGunu:""};
    const [form,setForm]=useState(empty);const [editId,setEditId]=useState(null);const f=(k,v)=>setForm({...form,[k]:v});
    const csvRef=useRef();
    const [importResult,setImportResult]=useState(null);
    /* BULK UPDATE */
    const [selected,setSelected]=useState({});
    const [bulkField,setBulkField]=useState("");
    const [bulkVal,setBulkVal]=useState("");
    const [showBulk,setShowBulk]=useState(false);

    const filteredEmps=filteredSortedEmps.filter(e=>{
      if(pSearch&&!e.name.toLowerCase().includes(pSearch.toLowerCase()))return false;
      if(pFirma&&e.firma!==pFirma)return false;
      if(pSube&&e.sube!==pSube)return false;
      return true;
    });
    const selCount=Object.values(selected).filter(Boolean).length;
    const allSelected=filteredEmps.length>0&&filteredEmps.every(e=>selected[e.id]);
    function toggleAll(){if(allSelected){setSelected({});}else{const s={};filteredEmps.forEach(e=>{s[e.id]=true;});setSelected(s);}}
    function toggleOne(id){setSelected({...selected,[id]:!selected[id]});}

    const bulkFields=[{k:"firma",l:"Firma",opts:D.firms},{k:"sube",l:"Şube",opts:D.subs},{k:"bolum",l:"Bölüm",opts:D.bols},{k:"gorev",l:"Görev",opts:D.gorevler},{k:"durum",l:"Durum",opts:D.durumlar},{k:"izin",l:"İzin Günü",opts:D.izinGunleri}];
    function applyBulk(){
      if(!bulkField||!bulkVal)return alert("Alan ve değer seçin!");
      const ids=Object.keys(selected).filter(k=>selected[k]).map(Number);
      if(ids.length===0)return alert("Personel seçin!");
      if(!confirm(ids.length+" personelin "+bulkFields.find(f=>f.k===bulkField)?.l+" alanı '"+bulkVal+"' olarak güncellenecek. Onaylıyor musunuz?"))return;
      setDb(p=>({...p,employees:p.employees.map(e=>ids.includes(e.id)?{...e,[bulkField]:bulkVal}:e)}),addLog("Toplu Güncelleme",ids.length+" personel → "+bulkFields.find(f=>f.k===bulkField)?.l+": "+bulkVal));
      setSelected({});setBulkVal("");setShowBulk(false);
    }

    const save=()=>{if(!form.name.trim())return alert("Ad Soyad zorunlu!");
      if(editId){setDb(p=>({...p,employees:p.employees.map(e=>e.id===editId?{...form,id:editId,maas:Number(form.maas),yol:Number(form.yol),sabitAvans:Number(form.sabitAvans)}:e)}),addLog("Personel Güncellendi",form.name));setEditId(null);}
      else{setDb(p=>({...p,employees:[...p.employees,{...form,id:p.nextEmpId,maas:Number(form.maas),yol:Number(form.yol),sabitAvans:Number(form.sabitAvans)}],nextEmpId:p.nextEmpId+1}),addLog("Personel Eklendi",form.name));}
      setForm(empty);};
    const del=(id)=>{const emp=D.employees.find(e=>e.id===id);if(confirm("Personel silinsin mi?"))setDb(p=>({...p,employees:p.employees.filter(e=>e.id!==id)}),addLog("Personel Silindi",emp?emp.name:"#"+id));};

    function downloadTemplate(){
      const header="Ad Soyad;Görev;Firma;Şube;Bölüm;Aylık Maaş;Yol;Sabit Avans;İzin Günü;Durum;İşe Giriş;Kıdem Tarihi;Doğum Günü;İşten Çıkış";
      const sample="AHMET YILMAZ;Mühendis;Mnl Gıda;Sahrayıcedit;Baklava;15000;2000;5000;Pazar;S;2024-01-15;2024-01-15;1990-05-20;";
      const bom="\uFEFF";
      const blob=new Blob([bom+header+"\n"+sample+"\n"],{type:"text/csv;charset=utf-8"});
      const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="personel_sablon.csv";a.click();URL.revokeObjectURL(url);
    }

    function handleCSVUpload(e){
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const text=ev.target.result;
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){alert("Dosyada veri bulunamadı!");return;}
        const sep=lines[0].includes(";")?";":lines[0].includes("\t")?"\t":",";
        const headers=lines[0].split(sep).map(h=>h.trim().replace(/^["']|["']$/g,""));
        const hMap={};
        const aliases={"ad soyad":"name","adsoyad":"name","ad":"name","isim":"name","görev":"gorev","gorev":"gorev","firma":"firma","şube":"sube","sube":"sube","bölüm":"bolum","bolum":"bolum","aylık maaş":"maas","aylik maas":"maas","maaş":"maas","maas":"maas","yol":"yol","sabit avans":"sabitAvans","avans":"sabitAvans","izin günü":"izin","izin gunu":"izin","izin":"izin","durum":"durum","işe giriş":"iseGiris","ise giris":"iseGiris","kıdem tarihi":"kidem","kidem tarihi":"kidem","kidem":"kidem","doğum günü":"dogumGunu","dogum gunu":"dogumGunu","işten çıkış":"istenCikis","isten cikis":"istenCikis"};
        headers.forEach((h,i)=>{const key=aliases[h.toLowerCase()];if(key)hMap[key]=i;});
        if(hMap.name===undefined){alert("'Ad Soyad' sütunu bulunamadı! Şablonu indirip kullanın.");return;}
        const newEmps=[];let skipped=0;
        for(let i=1;i<lines.length;i++){
          const cols=lines[i].split(sep).map(c=>c.trim().replace(/^["']|["']$/g,""));
          const name=cols[hMap.name]||"";
          if(!name){skipped++;continue;}
          newEmps.push({name:name.toUpperCase(),gorev:cols[hMap.gorev]||"",firma:cols[hMap.firma]||"",sube:cols[hMap.sube]||"",bolum:cols[hMap.bolum]||"",
            maas:Number(String(cols[hMap.maas]||0).replace(/[.,]/g,m=>m===","?".":""))||0,
            yol:Number(String(cols[hMap.yol]||0).replace(/[.,]/g,m=>m===","?".":""))||0,
            sabitAvans:Number(String(cols[hMap.sabitAvans]||0).replace(/[.,]/g,m=>m===","?".":""))||0,
            izin:cols[hMap.izin]||"Pazar",durum:cols[hMap.durum]||"S",iseGiris:cols[hMap.iseGiris]||"",istenCikis:cols[hMap.istenCikis]||"",kidem:cols[hMap.kidem]||"",dogumGunu:cols[hMap.dogumGunu]||""});
        }
        if(newEmps.length===0){alert("Geçerli kayıt bulunamadı!");return;}
        setDb(p=>{let nid=p.nextEmpId;const added=newEmps.map(emp=>({...emp,id:nid++}));return{...p,employees:[...p.employees,...added],nextEmpId:nid};},addLog("CSV İçe Aktarıldı",newEmps.length+" personel eklendi"));
        setImportResult({added:newEmps.length,skipped});
        setTimeout(()=>setImportResult(null),5000);
      };
      reader.readAsText(file,"UTF-8");e.target.value="";
    }

    return <div><Header icon={<IcUserPlus/>} title="Personel Kartları" sub="Yeni personel ekleme, düzenleme ve toplu güncelleme"/>
      {can("ekle")&&<div style={{background:C.card,borderRadius:12,padding:"24px 28px",border:"1px solid "+C.cardBrd,marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>{editId?"Personel Düzenle":"Yeni Personel Ekle"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:14,marginBottom:14}}>
          <div><div style={{fontSize:12,fontWeight:600,color:C.teal,marginBottom:4}}>Ad Soyad *</div><input value={form.name} onChange={e=>f("name",e.target.value)}/></div>
          <div><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Görev</div><select value={form.gorev} onChange={e=>f("gorev",e.target.value)}><option value="">Seç...</option>{D.gorevler.map(g=><option key={g}>{g}</option>)}</select></div>
          <div><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Firma</div><select value={form.firma} onChange={e=>f("firma",e.target.value)}><option value="">Seç...</option>{userFirms.map(x=><option key={x}>{x}</option>)}</select></div>
          <div><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Şube</div><select value={form.sube} onChange={e=>f("sube",e.target.value)}><option value="">Seç...</option>{userSubs.map(x=><option key={x}>{x}</option>)}</select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:14,marginBottom:14}}>
          <div><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Bölüm</div><select value={form.bolum} onChange={e=>f("bolum",e.target.value)}><option value="">Seç...</option>{D.bols.map(x=><option key={x}>{x}</option>)}</select></div>
          <div><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Aylık Maaş (₺)</div><input type="number" value={form.maas} onChange={e=>f("maas",e.target.value)}/></div>
          <div><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Yol Vb. Ek (₺)</div><input type="number" value={form.yol} onChange={e=>f("yol",e.target.value)}/></div>
          <div><div style={{fontSize:12,fontWeight:600,color:C.teal,marginBottom:4}}>Sabit Avans (Aylık) (₺)</div><input type="number" value={form.sabitAvans} onChange={e=>f("sabitAvans",e.target.value)}/></div>

  /* BORDRO INPUT - local state, save on blur, format on display */
  function ManualInput({empId,field,dbVal,onSave,disabled,style:sx}){
    const [txt,setTxt]=useState("");
    const [editing,setEditing]=useState(false);
    const focused=useRef(false);
    const toNum=(s)=>{const v=String(s||"");if(v.includes(","))return Number(v.replace(/\./g,"").replace(",","."))||0;return Number(v)||0;};
    const dbNum=toNum(dbVal);
    useEffect(()=>{if(!focused.current)setTxt(dbNum?String(dbNum).replace(".",","):"");},[dbVal]);
    function handleFocus(){focused.current=true;setEditing(true);setTxt(dbNum?String(dbNum).replace(".",","):"");}
    function handleBlur(){focused.current=false;setEditing(false);const n=toNum(txt);onSave(empId,field,n?String(n):"");}
    function handleChange(e){const v=e.target.value.replace(/[^0-9,]/g,"");setTxt(v);}
    const display=editing?txt:(dbNum?fmt(dbNum):"");
    return <input type="text" inputMode="decimal" value={display} onChange={handleChange} onFocus={handleFocus} onBlur={handleBlur} style={sx} placeholder="0" readOnly={disabled}/>;
  }

  /* BORDRO */
  function BordroPage(){

    const fe=(v)=>v!==0?fmt(v):"";const fn=(v)=>v>0?"-"+fmt(v):"";
    function setManual(empId,field,val){const emp=D.employees.find(e=>e.id===empId);if(emp&&isEmpKapali(emp))return;const mk=bKey(empId);setDb(p=>{const m={...p.bordroManual};if(!m[mk])m[mk]={banka:"",bes:"",odenen:""};m[mk]={...m[mk],[field]:val};return{...p,bordroManual:m};},val?addLog("Bordro Düzenlendi",(emp?emp.name:"#"+empId)+" → "+field+": "+val):null);}
    function durumColor(emp){const d=emp.durum;if(d==="E")return"#ecfdf5";if(d===".")return"#fefce8";if(d==="K")return"#f3e8ff";return"transparent";}
    function durumBadge(emp){const d=emp.durum;if(d==="E")return{bg:"#dcfce7",cl:"#16a34a"};if(d===".")return{bg:"#fef9c3",cl:"#a16207"};if(d==="K")return{bg:"#ede9fe",cl:"#7c3aed"};return{bg:"#f3f4f6",cl:C.sec};}
    function handlePrint(){
      const fL=bFirma||"Tüm Firmalar",sL=bSube||"Tüm Şubeler";
      const w=window.open("","_blank");
      const css="*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:10px;padding:6mm;-webkit-print-color-adjust:exact;print-color-adjust:exact}table{width:100%;border-collapse:collapse;table-layout:auto}th,td{border:1px solid #999;padding:3px 4px;text-align:center;font-size:10px}th{background:#e8e8e8;font-weight:700;font-size:9px}td:first-child,th:first-child{text-align:left;white-space:nowrap}.hdr{text-align:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #333}.hdr h3,.hdr h1,.hdr h2,.hdr h4{font-size:15px;margin-bottom:3px}.hdr h1{font-weight:800}.hdr h3{color:#555;font-weight:700}.hdr h2{color:#333;font-weight:700}.hdr h4{color:#666;font-weight:600}.re{background:#ecfdf5}.rd{background:#fefce8}.rk{background:#f3e8ff}.tot{background:#f0fdf4;font-weight:bold}.neg{color:#c00}.pos{color:#060}.blu{color:#2563eb}@page{size:landscape;margin:5mm}";
      const hd=cols;
      let rows="<tr class='tot'><td>GENEL TOPLAM:</td><td></td><td></td><td>"+fmt(tot.maas)+"</td><td class='blu'>"+tot.gun+"</td><td>"+fmt(tot.yol)+"</td><td>"+fe(tot.saat)+"</td><td>"+fe(tot.mesai)+"</td><td>"+fe(tot.fm)+"</td><td class='blu'>"+fe(tot.rt)+"</td><td>"+fe(tot.mesaiT)+"</td><td><b>"+fmt(tot.maasT)+"</b></td><td>"+fe(tot.banka)+"</td><td>"+fe(tot.bes)+"</td><td>"+fe(tot.a1)+"</td><td class='neg'>"+fn(tot.ke)+"</td><td class='neg'>"+(tot.yt!==0?fmt(tot.yt):"")+"</td><td class='pos'>"+fmt(tot.el)+"</td><td>"+fe(tot.dv)+"</td><td class='neg'>"+fn(tot.a2)+"</td><td class='neg'>"+fn(tot.ur)+"</td><td>"+fe(tot.od)+"</td><td><b>"+fmt(tot.kl)+"</b></td><td></td></tr>";
      filtered.forEach(b=>{
        const m=D.bordroManual[bKey(b.emp.id)]||{};
        const rc=b.emp.durum==="E"?"re":b.emp.durum==="."?"rd":b.emp.durum==="K"?"rk":"";

        rows+="<td>"+fmt(b.maas)+"</td>";
        rows+="<td class='blu'>"+b.gun+"</td>";

        rows+="<td>"+(Number(m.bes)?fmt(Number(m.bes)):"")+"</td>";

    function handleKapat(){
      if(!bFirma||!bSube)return alert("Dönemi kapatmak için Firma ve Şube seçmelisiniz!");
      if(!confirm(bFirma+" / "+bSube+" dönemini kapatmak ve kalanları bir sonraki aya devretmek istediğinize emin misiniz?"))return;
      const kapKey=donemKey+"|"+bFirma+"|"+bSube;
      const ndk=nextDonemKey();
      const devir={...D.bordroDevir};
      const snap={...D.bordroSnapshot};
      filtered.forEach(b=>{
        /* Kalan → bir sonraki ayın devir sütununa */
        devir[ndk+"|"+b.emp.id]=b.kalan;

        snap[bKey(b.emp.id)]={maas:b.emp.maas,yol:b.emp.yol,sabitAvans:b.emp.sabitAvans};
      });
      setDb(p=>({...p,bordroKapali:{...p.bordroKapali,[kapKey]:true},bordroDevir:devir,bordroSnapshot:snap}),addLog("Dönem Kapatıldı",bFirma+" / "+bSube+" — "+donemLabel));
      alert(bFirma+" / "+bSube+" — "+donemLabel+" dönemi kapatıldı. Kalanlar bir sonraki aya devredildi.");
    }
    function handleAc(){

    function handleCode(code){if(!selCell)return;const{empId,day}=selCell;if(!canEditDay(day)){alert("Geçmiş günlerde değişiklik yapamazsınız!");setSelCell(null);return;}const key=pKey(empId,day);const eName=empName(empId);
      if(code==="S"){const val=prompt("Kaç saat:","1");if(val!==null&&!isNaN(val)&&val.trim()!==""){setDb(p=>({...p,puantajCells:{...p.puantajCells,[key]:"S"},puantajSaat:{...p.puantajSaat,[key]:Number(val)}}),addLog("Puantaj","Saat girişi: "+eName+" Gün "+day+" → S"+val));}}
      else if(code==="-"||code==="/"){const sebep=prompt(code==="-"?"Gelmeme sebebi:":"Yarım gün sebebi:","");if(sebep===null)return;setDb(p=>({...p,puantajCells:{...p.puantajCells,[key]:code},puantajNotes:{...p.puantajNotes,[key]:sebep}}),addLog("Puantaj",eName+" Gün "+day+" → "+code+(sebep?" ("+sebep+")":"")));}
      else if(code==="CLEAR"){setDb(p=>{const nc={...p.puantajCells};delete nc[key];const ns={...p.puantajSaat};delete ns[key];const nn={...p.puantajNotes};delete nn[key];return{...p,puantajCells:nc,puantajSaat:ns,puantajNotes:nn};},addLog("Puantaj",eName+" Gün "+day+" → Temizlendi"));}
      else{setDb(p=>({...p,puantajCells:{...p.puantajCells,[key]:code}}),addLog("Puantaj",eName+" Gün "+day+" → "+code));}
      setSelCell(null);}
    const filtered=filteredSortedEmps.filter(emp=>{if(ptSearch&&!emp.name.toLowerCase().includes(ptSearch.toLowerCase()))return false;if(ptF&&emp.firma!==ptF)return false;if(ptS&&emp.sube!==ptS)return false;if(ptDs.length>0&&!ptDs.includes(emp.durum))return false;return true;});
    const legend=[["X","Geldi","#374151"],["-","Gelmedi","#6b7280"],["/","Yarım Gün","#9ca3af"],[".","Ayrıldı","#991b1b"],["M","Mazeret","#0d9488"],["Yİ","Yıllık İzin","#dc2626"],["R","Raporlu","#a16207"],["RT","Resmi Tatil","#2563eb"],["FM","Fazla Mesai","#7c3aed"],["S","Saat","#0d9488"],["O","Ölüm","#374151"],["E","Evlilik","#db2777"],["H","Hastalık","#b45309"]];

    function handleBulkApply(){
      const{code,dayStart,dayEnd,sebep,saat}=bulkPt;
      let ds=Number(dayStart),de=Number(dayEnd);
      if(ds<1||de>pDays||ds>de)return alert("Geçersiz gün aralığı!");
      if(filtered.length===0)return alert("Süzülmüş personel yok!");
      if(curUser.role==="kullanici"){if(ds<todayDay)ds=todayDay;if(ds>de)return alert("Seçilen gün aralığı geçmişte kaldı. Geçmiş günlerde değişiklik yapamazsınız!");}
      const gunSayisi=de-ds+1;
      if(!confirm(filtered.length+" personel × "+gunSayisi+" gün = "+filtered.length*gunSayisi+" hücreye '"+code+"' uygulanacak. Onaylıyor musunuz?"))return;
      setDb(p=>{
        const nc={...p.puantajCells};const ns={...p.puantajSaat};const nn={...p.puantajNotes};
        filtered.forEach(emp=>{
          for(let d=ds;d<=de;d++){
            const key=pKey(emp.id,d);
            if(code==="CLEAR"){delete nc[key];delete ns[key];delete nn[key];}
            else{
              nc[key]=code;
              if(code==="S")ns[key]=Number(saat)||1;
              if(code==="-"||code==="/")nn[key]=sebep||"";
            }
          }
        });
        return{...p,puantajCells:nc,puantajSaat:ns,puantajNotes:nn};
      },addLog("Toplu Puantaj",filtered.length+" personel × "+gunSayisi+" gün → "+code));
      alert("Toplu giriş tamamlandı!");
    }

    return <div>
      {/* HEADER */}
      <div style={{background:C.card,borderRadius:12,padding:"20px 28px",marginBottom:20,border:"1px solid "+C.cardBrd,textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:8}}>
          <button onClick={goPrev} style={{background:"none",border:"none",cursor:"pointer",color:C.mut}}><IcChevL/></button>
          <span style={{fontSize:14,fontWeight:600,color:C.sec,letterSpacing:"0.1em"}}>{donem}</span>
          <button onClick={goNext} style={{background:"none",border:"none",cursor:"pointer",color:C.mut}}><IcChevR/></button>
        </div>
        <div style={{fontSize:24,fontWeight:800,color:C.tealDk,marginBottom:6}}>PUANTAJ TABLOSU</div>
        <div style={{fontSize:14,fontWeight:600,color:C.sec}}>{firmaLabel} — {subeLabel}</div>
      </div>
      {/* FİLTRELER */}
      <div style={{background:C.card,borderRadius:12,padding:"14px 20px",marginBottom:12,display:"flex",alignItems:"center",gap:12,border:"1px solid "+C.cardBrd,flexWrap:"wrap"}}>
        <IcFilter/><input ref={ptSearchRef} placeholder="Personel Ara..." defaultValue={ptSearch} onKeyDown={e=>{if(e.key==="Enter")setPtSearch(e.target.value);}} onBlur={e=>setPtSearch(e.target.value)} style={{width:160}}/>
        <select value={ptF} onChange={e=>setPtF(e.target.value)} style={{width:150}}><option value="">Tüm Firmalar</option>{userFirms.map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={ptS} onChange={e=>setPtS(e.target.value)} style={{width:150}}><option value="">Tüm Şubeler</option>{userSubs.map(s=><option key={s} value={s}>{s}</option>)}</select>
        {/* DURUM ÇOK SEÇİMLİ */}
        <div style={{position:"relative"}}>
          <div onClick={()=>setPtDurDrop(!ptDurDrop)} style={{padding:"10px 14px",background:"#f6f7f9",border:"1.5px solid "+C.brd,borderRadius:8,fontSize:13,cursor:"pointer",minWidth:160,color:ptDs.length?C.txt:C.mut,userSelect:"none"}}>
            {ptDs.length?ptDs.join(", "):"Tüm Durumlar"}
          </div>
          {ptDurDrop&&<div style={{position:"absolute",top:"100%",left:0,background:"#fff",border:"1.5px solid "+C.brd,borderRadius:8,padding:8,zIndex:50,minWidth:180,boxShadow:"0 8px 24px rgba(0,0,0,.12)",marginTop:4}}>
            {D.durumlar.map(d=><label key={d} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 4px",fontSize:13,cursor:"pointer"}}>
              <input type="checkbox" checked={ptDs.includes(d)} onChange={()=>toggleDurum(d)} style={{width:"auto"}}/>{d}
            </label>)}
            <div style={{display:"flex",gap:8,marginTop:6,borderTop:"1px solid "+C.brdLt,paddingTop:6}}>
              {ptDs.length>0&&<span onClick={()=>setPtDs([])} style={{fontSize:12,color:C.red,cursor:"pointer"}}>Temizle</span>}
              <span onClick={()=>setPtDurDrop(false)} style={{fontSize:12,color:C.teal,cursor:"pointer",marginLeft:"auto"}}>Kapat</span>
            </div>
          </div>}
        </div>
        <div style={{flex:1}}/>
        {can("degistir","puantaj")&&<Btn bg={C.pur} onClick={()=>setBulkPt({...bulkPt,show:!bulkPt.show})} style={{fontSize:12,padding:"8px 16px"}}>{bulkPt.show?"▲ Toplu Giriş":"▼ Toplu Giriş"}</Btn>}
        <Btn onClick={handlePrint}><IcPrint/> Yazdır</Btn><span onClick={()=>{setPtSearch("");setPtF("");setPtS("");setPtDs([]);setPtDurDrop(false);if(ptSearchRef.current)ptSearchRef.current.value="";}} style={{color:C.teal,fontWeight:600,fontSize:13,cursor:"pointer"}}>Filtreyi Temizle</span>
      </div>
      {/* TOPLU GİRİŞ PANELİ */}
      {bulkPt.show&&<div style={{background:C.card,borderRadius:12,padding:"18px 24px",marginBottom:12,border:"2px solid "+C.pur}}>
        <div style={{fontSize:14,fontWeight:700,color:C.pur,marginBottom:12}}>Toplu Puantaj Girişi</div>
        <div style={{fontSize:12,color:C.sec,marginBottom:12}}>Süzülmüş <strong style={{color:C.txt}}>{filtered.length}</strong> personele toplu kod uygulanacak</div>
        <div style={{display:"flex",gap:14,alignItems:"flex-end",flexWrap:"wrap",marginBottom:12}}>
          <div><div style={{fontSize:11,fontWeight:600,color:C.sec,marginBottom:4}}>Kod</div>
            <select value={bulkPt.code} onChange={e=>setBulkPt({...bulkPt,code:e.target.value})} style={{width:130}}>
              {CODES.map(({c,l})=><option key={c} value={c}>{c} - {l}</option>)}
              <option value="CLEAR">⌫ Temizle</option>
            </select>
          </div>
          <div><div style={{fontSize:11,fontWeight:600,color:C.sec,marginBottom:4}}>Başlangıç Gün</div>
            <input type="number" min="1" max={pDays} value={bulkPt.dayStart} onChange={e=>setBulkPt({...bulkPt,dayStart:e.target.value})} style={{width:70}}/>
          </div>
          <div><div style={{fontSize:11,fontWeight:600,color:C.sec,marginBottom:4}}>Bitiş Gün</div>
            <input type="number" min="1" max={pDays} value={bulkPt.dayEnd} onChange={e=>setBulkPt({...bulkPt,dayEnd:e.target.value})} style={{width:70}}/>
          </div>
          {(bulkPt.code==="-"||bulkPt.code==="/")&&<div><div style={{fontSize:11,fontWeight:600,color:C.sec,marginBottom:4}}>Sebep</div>
            <input value={bulkPt.sebep} onChange={e=>setBulkPt({...bulkPt,sebep:e.target.value})} placeholder="Sebep girin..." style={{width:180}}/>
          </div>}
          {bulkPt.code==="S"&&<div><div style={{fontSize:11,fontWeight:600,color:C.sec,marginBottom:4}}>Saat</div>
            <input type="number" min="1" value={bulkPt.saat} onChange={e=>setBulkPt({...bulkPt,saat:e.target.value})} style={{width:70}}/>
          </div>}
          <Btn bg={C.pur} onClick={handleBulkApply} style={{height:42}}><IcCheck/> Uygula ({filtered.length} kişi)</Btn>
          <Btn bg="#6b7280" onClick={()=>setBulkPt({...bulkPt,show:false})} style={{height:42,fontSize:12}}><IcX/> Kapat</Btn>
        </div>
        <div style={{fontSize:11,color:C.mut}}>Not: Toplu giriş sadece süzülmüş (filtrelenmiş) personellere uygulanır. Önce firma/şube/durum filtresini ayarlayın.</div>
      </div>}
      {curUser.role==="kullanici"&&todayDay<=pDays&&<div style={{background:"#fef9c3",borderRadius:8,padding:"10px 16px",marginBottom:12,fontSize:12,color:"#92400e",display:"flex",alignItems:"center",gap:8}}>
        🔒 Kullanıcı olarak sadece bugün ({todayDay} {months[pMonth]}) ve sonrası düzenlenebilir. Geçmiş günler kilitlidir.
      </div>}
      <div style={{display:"flex",gap:14,marginBottom:12,flexWrap:"wrap",fontSize:12,color:C.sec}}>{legend.map(([c,l,cl])=><span key={c} style={{display:"inline-flex",alignItems:"center",gap:4}}><strong style={{color:cl}}>{c}</strong> {l}</span>)}</div>
      {selCell&&<div onClick={()=>setSelCell(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.25)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:"20px 24px",boxShadow:"0 12px 40px rgba(0,0,0,.2)",minWidth:300}}><div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Kod Seç</div><div style={{fontSize:12,color:C.sec,marginBottom:6}}>{empName(selCell.empId)} — {selCell.day} {months[pMonth]}</div>{D.puantajNotes[pKey(selCell.empId,selCell.day)]&&<div style={{fontSize:11,color:C.orange,marginBottom:10,padding:"6px 10px",background:"#fff7ed",borderRadius:6,border:"1px solid #fed7aa"}}>📝 {D.puantajNotes[pKey(selCell.empId,selCell.day)]}</div>}<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>{CODES.map(({c,l,bg,cl})=><button key={c} onClick={()=>handleCode(c)} style={{padding:"8px 4px",borderRadius:8,border:"none",background:bg,color:cl,fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"center"}}><div>{c}</div><div style={{fontSize:9,fontWeight:500,marginTop:2}}>{l}</div></button>)}<button onClick={()=>handleCode("CLEAR")} style={{padding:"8px 4px",borderRadius:8,border:"1px solid #e5e7eb",background:"#f9fafb",color:"#6b7280",fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"center"}}><div>⌫</div><div style={{fontSize:9,fontWeight:500,marginTop:2}}>Temizle</div></button></div></div></div>}
      <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.cardBrd,overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:1400}}><thead><tr>
          <th style={{...thS,position:"sticky",left:0,zIndex:3,minWidth:150,background:"#f8fafb"}}>PERSONEL</th><th style={{...thS,minWidth:80}}>FİRMA</th><th style={{...thS,textAlign:"center",minWidth:70}}>İZİN GÜNÜ</th>
          {Array.from({length:pDays},(_,i)=>{const d=i+1;const rtDay=isHolidayDay(d);const locked=!canEditDay(d);return <th key={i} style={{...thS,textAlign:"center",minWidth:30,padding:"4px 1px",background:rtDay?"#dbeafe":locked?"#f1f1f1":"#f8fafb",color:rtDay?"#2563eb":locked?"#bbb":C.sec}}><div style={{fontSize:10}}>{d}</div><div style={{fontSize:8,fontWeight:400}}>{dayA[i]}</div></th>;})}
          <th style={{...thS,textAlign:"center",background:C.yelBg,minWidth:35}}>SAAT</th><th style={{...thS,textAlign:"center",background:C.yelBg,minWidth:45}}>MESAİ</th><th style={{...thS,textAlign:"center",background:C.yelBg,minWidth:30}}>FM</th><th style={{...thS,textAlign:"center",background:"#dbeafe",minWidth:30}}>RT</th><th style={{...thS,textAlign:"center",background:C.yelBg,minWidth:25}}>Yİ</th>
        </tr></thead><tbody>
          {filtered.map(emp=>{const sm=getPSummary(emp);
            const rowBg=emp.durum==="E"?"#ecfdf5":emp.durum==="."?"#fefce8":emp.durum==="K"?"#f3e8ff":"transparent";
            const stickyBg=rowBg==="transparent"?"#fff":rowBg;
            return <tr key={emp.id} style={{borderBottom:"1px solid "+C.brdLt,background:rowBg}}>
              <td style={{...tdS,fontWeight:600,position:"sticky",left:0,background:stickyBg,zIndex:1,whiteSpace:"nowrap"}}>{emp.name}</td>
              <td style={{...tdS,color:C.sec,fontSize:12}}>{emp.firma}</td>
              <td style={{...tdS,color:C.sec,fontSize:12,textAlign:"center"}}>{emp.izin}</td>
              {Array.from({length:pDays},(_,di)=>{const day=di+1;const code=getCellCode(emp.id,day);const izin=isIzinDay(emp,day);const isRT=isHolidayDay(day);const cs=codeStyle(code);
                let bg,bd,cl;
                if(isRT){bg="#dbeafe";bd="1px solid #93c5fd";cl=cs?cs.cl:"#2563eb";}
                else if(izin){bg="#fee2e2";bd="1px solid #fca5a5";cl=cs?cs.cl:"#dc2626";}
                else if(cs){bg=cs.bg;bd="1px solid "+cs.cl+"40";cl=cs.cl;}
                else{bg="transparent";bd="1px dashed #e5e7eb";cl=C.sec;}
                let display=code;if(code==="S")display="S"+(D.puantajSaat[pKey(emp.id,day)]||"");
                const note=D.puantajNotes[pKey(emp.id,day)]||"";
                return <td key={di} style={{padding:"2px 1px",textAlign:"center"}}><div title={note?note:undefined} onClick={()=>{if(can("degistir","puantaj")&&canEditDay(day))setSelCell({empId:emp.id,day});}} style={{width:28,height:24,borderRadius:4,background:bg,border:bd,display:"flex",alignItems:"center",justifyContent:"center",fontSize:code==="S"?8:9,fontWeight:700,color:cl,margin:"0 auto",cursor:can("degistir","puantaj")&&canEditDay(day)?"pointer":"default",opacity:canEditDay(day)?1:0.7,position:"relative"}}>{display}{note&&<span style={{position:"absolute",top:-2,right:-2,width:6,height:6,borderRadius:"50%",background:"#f97316"}}/>}</div></td>;
              })}
              <td style={{textAlign:"center",fontSize:12,fontWeight:600,background:C.yelBg,padding:"8px 4px"}}>{sm.saat||"-"}</td>
              <td style={{textAlign:"center",fontSize:12,fontWeight:700,background:C.yelBg,padding:"8px 4px",color:sm.mesai>0?"#16a34a":sm.mesai<0?C.red:C.sec}}>{sm.mesai}</td>
              <td style={{textAlign:"center",fontSize:12,fontWeight:600,background:C.yelBg,padding:"8px 4px"}}>{sm.fm||"-"}</td>
              <td style={{textAlign:"center",fontSize:12,fontWeight:700,background:"#dbeafe",padding:"8px 4px",color:sm.rt>0?"#2563eb":C.sec}}>{sm.rt||"-"}</td>
              <td style={{textAlign:"center",fontSize:12,fontWeight:600,background:C.yelBg,padding:"8px 4px",color:sm.yi>0?"#dc2626":C.sec}}>{sm.yi||"-"}</td>
            </tr>;})}
        </tbody></table>
      </div>
    </div>;
  }

  /* İŞLEM GEÇMİŞİ (LOG) */
  function LogPage(){
    const [logSearch,setLogSearch]=useState("");
    const [logUser,setLogUser]=useState("");
    const [logAction,setLogAction]=useState("");
    const logs=D.logs||[];
    const uniqueUsers=[...new Set(logs.map(l=>l.user))];
    const uniqueActions=[...new Set(logs.map(l=>l.action))];
    const filtered=logs.filter(l=>{
      if(logSearch&&!l.detail.toLowerCase().includes(logSearch.toLowerCase())&&!l.action.toLowerCase().includes(logSearch.toLowerCase()))return false;
      if(logUser&&l.user!==logUser)return false;
      if(logAction&&l.action!==logAction)return false;
      return true;
    });
    function fmtTs(ts){try{const d=new Date(ts);return d.toLocaleDateString("tr-TR")+" "+d.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}catch(e){return ts;}}
    function actionColor(a){if(a.includes("Silindi"))return{bg:C.redBg,cl:C.red};if(a.includes("Eklendi"))return{bg:C.grnBg,cl:C.grn};if(a.includes("Güncelle")||a.includes("Düzenle"))return{bg:"#eff6ff",cl:C.blu};if(a.includes("Puantaj"))return{bg:"#f3e8ff",cl:C.pur};if(a.includes("Dönem"))return{bg:C.yelBg,cl:"#a16207"};if(a.includes("Yedek"))return{bg:C.orgBg,cl:C.orange};return{bg:"#f3f4f6",cl:C.sec};}
    function clearLogs(){if(confirm("Tüm işlem geçmişi silinecek. Emin misiniz?"))setDb(p=>({...p,logs:[]}),addLog("Log Temizlendi","Tüm geçmiş silindi"));}
    function exportLogs(){
      const header="Tarih;Kullanıcı;Rol;İşlem;Detay\n";
      const rows=filtered.map(l=>fmtTs(l.ts)+";"+l.user+";"+l.role+";"+l.action+";"+l.detail).join("\n");
      const bom="\uFEFF";const blob=new Blob([bom+header+rows],{type:"text/csv;charset=utf-8"});
      const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="islem_gecmisi_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);
    }
    return <div>
      <Header icon={<IcLog/>} title="İşlem Geçmişi" sub={"Tüm değişiklikler kayıt altında — "+logs.length+" kayıt"} right={<div style={{display:"flex",gap:10}}><BtnO onClick={exportLogs}><IcDl/> CSV İndir</BtnO>{curUser.role==="admin"&&<Btn bg={C.red} onClick={clearLogs}><IcTrash/> Temizle</Btn>}</div>}/>
      {/* BİLGİ */}
      <div style={{background:"#ecfdf5",borderRadius:10,padding:"14px 20px",marginBottom:16,border:"1px solid #bbf7d0",display:"flex",alignItems:"flex-start",gap:12}}>
        <span style={{fontSize:20,flexShrink:0}}>✅</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#166534",marginBottom:4}}>Otomatik Kayıt — Tüm Tarayıcılar Senkron</div>
          <div style={{fontSize:12,color:"#15803d",lineHeight:1.6}}>Tüm değişiklikler anında data.json dosyasına kaydedilir. Hangi tarayıcıdan açarsanız açın aynı güncel veriyi görürsünüz.</div>
        </div>
      </div>
      {/* FİLTRELER */}
      <div style={{background:C.card,borderRadius:12,padding:"14px 20px",marginBottom:12,display:"flex",alignItems:"center",gap:12,border:"1px solid "+C.cardBrd,flexWrap:"wrap"}}>
        <IcFilter/>
        <input placeholder="Ara..." value={logSearch} onChange={e=>setLogSearch(e.target.value)} style={{width:200}}/>
        <select value={logUser} onChange={e=>setLogUser(e.target.value)} style={{width:150}}><option value="">Tüm Kullanıcılar</option>{uniqueUsers.map(u=><option key={u} value={u}>{u}</option>)}</select>
        <select value={logAction} onChange={e=>setLogAction(e.target.value)} style={{width:180}}><option value="">Tüm İşlemler</option>{uniqueActions.map(a=><option key={a} value={a}>{a}</option>)}</select>
        <div style={{flex:1}}/>
        <span style={{fontSize:12,color:C.sec}}>{filtered.length} kayıt gösteriliyor</span>
        <span onClick={()=>{setLogSearch("");setLogUser("");setLogAction("");}} style={{color:C.teal,fontWeight:600,fontSize:13,cursor:"pointer"}}>Temizle</span>
      </div>
      {/* LOG TABLOSU */}
      <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.cardBrd,overflow:"hidden"}}>
        <table><thead><tr>
          {["TARİH / SAAT","KULLANICI","ROL","İŞLEM","DETAY"].map(h=><th key={h} style={thS}>{h}</th>)}
        </tr></thead>
        <tbody>{filtered.length===0?<tr><td colSpan={5} style={{padding:32,textAlign:"center",color:C.mut}}>Henüz işlem kaydı yok. Herhangi bir değişiklik yaptığınızda burada görünecektir.</td></tr>:filtered.slice(0,200).map(l=>{
          const ac=actionColor(l.action);
          return <tr key={l.id} style={{borderBottom:"1px solid "+C.brdLt}}>
            <td style={{...tdS,fontSize:12,color:C.sec,whiteSpace:"nowrap"}}>{fmtTs(l.ts)}</td>
            <td style={{...tdS,fontWeight:600,fontSize:12}}>{l.user}</td>
            <td style={tdS}><Badge text={l.role==="admin"?"ADMİN":l.role==="yonetici"?"YÖNETİCİ":"KULLANICI"} bg={l.role==="admin"?C.teal:l.role==="yonetici"?C.pur:C.blu} color="#fff"/></td>
            <td style={tdS}><Badge text={l.action} bg={ac.bg} color={ac.cl}/></td>
            <td style={{...tdS,fontSize:12,color:C.txt,maxWidth:400,overflow:"hidden",textOverflow:"ellipsis"}}>{l.detail}</td>
          </tr>;
        })}</tbody></table>
        {filtered.length>200&&<div style={{padding:12,textAlign:"center",fontSize:12,color:C.mut}}>İlk 200 kayıt gösterilmektedir. CSV olarak indirerek tümünü görebilirsiniz.</div>}
      </div>
    </div>;
  }

  /* AYARLAR */
  function AyarlarPage(){
    const fO=listOps("firms"),sO=listOps("subs"),bO=listOps("bols"),gO=listOps("gorevler"),dO=listOps("durumlar"),iO=listOps("izinGunleri");
    const [uf,setUf]=useState({name:"",pass:"",role:"kullanici"});
    const [editUid,setEditUid]=useState(null);
    const [editPerms,setEditPerms]=useState({});
    const [editFirmalar,setEditFirmalar]=useState([]);
    const [editSubeler,setEditSubeler]=useState([]);
    const addUser=()=>{if(!uf.name||!uf.pass)return alert("Ad ve Şifre zorunlu!");setDb(p=>({...p,users:[...p.users,{id:p.nextUserId,name:uf.name,pass:uf.pass,role:uf.role,firmalar:[],subeler:[],perms:MODULES.reduce((a,m)=>({...a,[m.key]:{gor:true,ekle:false,degistir:false,sil:false}}),{})}],nextUserId:p.nextUserId+1}),addLog("Kullanıcı Eklendi",uf.name+" ("+uf.role+")"));setUf({name:"",pass:"",role:"kullanici"});};
    const savePerms=(uid)=>{const u=D.users.find(x=>x.id===uid);setDb(p=>({...p,users:p.users.map(u=>u.id===uid?{...u,perms:editPerms,firmalar:editFirmalar,subeler:editSubeler}:u)}),addLog("Yetki Güncellendi",u?u.name:"#"+uid));setEditUid(null);};

    return <div><Header icon={<IcGear/>} title="Sistem Ayarları" sub="Tanımlar, kullanıcılar ve yedekleme"/>
      {/* KULLANICILAR */}
      <div style={{background:C.card,borderRadius:12,padding:"24px 28px",border:"1px solid "+C.cardBrd,marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Kullanıcı Yönetimi</div>
        <div style={{display:"flex",gap:14,alignItems:"flex-end",marginBottom:20}}>
          <div style={{flex:2}}><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Kullanıcı Adı</div><input value={uf.name} onChange={e=>setUf({...uf,name:e.target.value})}/></div>
          <div style={{flex:2}}><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Şifre</div><input type="password" value={uf.pass} onChange={e=>setUf({...uf,pass:e.target.value})}/></div>
          <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:4}}>Rol</div><select value={uf.role} onChange={e=>setUf({...uf,role:e.target.value})}><option value="admin">Admin</option><option value="yonetici">Yönetici</option><option value="kullanici">Kullanıcı</option></select></div>
          <Btn bg={C.blu} onClick={addUser} style={{height:42}}>Ekle</Btn>
        </div>
        <table><thead><tr>{["KULLANICI","ROL","YETKİLER","İŞLEM"].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
        <tbody>{D.users.map(u=><tr key={u.id}>
          <td style={tdS}>{u.name}</td>
          <td style={tdS}><Badge text={u.role==="admin"?"ADMİN":u.role==="yonetici"?"YÖNETİCİ":"KULLANICI"} bg={u.role==="admin"?C.teal:u.role==="yonetici"?C.pur:C.blu} color="#fff"/></td>
          <td style={{...tdS,color:C.sec,fontSize:12}}>{u.role==="admin"?"Tüm Yetkiler":(Object.entries(u.perms||{}).filter(([k,v])=>Object.values(v).some(x=>x)).map(([k])=>MODULES.find(m=>m.key===k)?.label).filter(Boolean).join(", ")||"Yetki yok")+(u.firmalar&&u.firmalar.length?" | Firma: "+u.firmalar.join(", "):"")+(u.subeler&&u.subeler.length?" | Şube: "+u.subeler.join(", "):"")}</td>
          <td style={tdS}><span style={{display:"inline-flex",gap:8}}>
            {u.role!=="admin"&&<button onClick={()=>{setEditUid(u.id);setEditPerms({...u.perms});setEditFirmalar(u.firmalar||[]);setEditSubeler(u.subeler||[]);}} style={{background:"none",border:"none",cursor:"pointer"}}><IcEdit/></button>}
            {u.role!=="admin"&&<button onClick={()=>{const uName=u.name;setDb(p=>({...p,users:p.users.filter(x=>x.id!==u.id)}),addLog("Kullanıcı Silindi",uName));}} style={{background:"none",border:"none",cursor:"pointer"}}><IcTrash/></button>}
          </span></td>
        </tr>)}</tbody></table>
      </div>
      {/* YETKI MODAL */}
      {editUid&&<div style={{background:C.card,borderRadius:12,padding:"24px 28px",border:"2px solid "+C.blu,marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Yetki Düzenle: {D.users.find(u=>u.id===editUid)?.name}</div>
        <div style={{fontSize:12,color:C.sec,marginBottom:16}}>Her modül için yetkileri belirleyin</div>
        <table><thead><tr><th style={thS}>MODÜL</th>{PERMS.map(p=><th key={p} style={{...thS,textAlign:"center"}}>{PERM_LABELS[p]}</th>)}</tr></thead>
        <tbody>{MODULES.filter(m=>m.key!=="ayarlar"||curUser.role==="admin").map(m=><tr key={m.key}>
          <td style={tdS}>{m.label}</td>
          {PERMS.map(p=><td key={p} style={{...tdS,textAlign:"center"}}><input type="checkbox" checked={editPerms[m.key]?.[p]||false} onChange={e=>{const np={...editPerms};if(!np[m.key])np[m.key]={gor:false,ekle:false,degistir:false,sil:false};np[m.key][p]=e.target.checked;setEditPerms(np);}} style={{width:"auto",cursor:"pointer"}}/></td>)}
        </tr>)}</tbody></table>
        <div style={{display:"flex",gap:10,marginTop:16}}><Btn bg={C.blu} onClick={()=>savePerms(editUid)}><IcSave/> Kaydet</Btn><Btn bg="#6b7280" onClick={()=>setEditUid(null)}><IcX/> İptal</Btn></div>
        {/* FİRMA / ŞUBE SEÇİMİ */}
        <div style={{marginTop:20,paddingTop:20,borderTop:"1px solid "+C.brd}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Erişim İzni: Firmalar ve Şubeler</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:8}}>Firmalar (boş = hepsine erişim)</div>
              {D.firms.map(f=><label key={f} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",fontSize:13,cursor:"pointer"}}>
                <input type="checkbox" checked={editFirmalar.includes(f)} onChange={e=>{if(e.target.checked)setEditFirmalar([...editFirmalar,f]);else setEditFirmalar(editFirmalar.filter(x=>x!==f));}} style={{width:"auto"}}/>
                {f}
              </label>)}
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:C.sec,marginBottom:8}}>Şubeler (boş = hepsine erişim)</div>
              {D.subs.map(s=><label key={s} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",fontSize:13,cursor:"pointer"}}>
                <input type="checkbox" checked={editSubeler.includes(s)} onChange={e=>{if(e.target.checked)setEditSubeler([...editSubeler,s]);else setEditSubeler(editSubeler.filter(x=>x!==s));}} style={{width:"auto"}}/>
                {s}
              </label>)}
            </div>
          </div>
        </div>
      </div>}
      {/* TANIMLAR */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:20}}>
        <EditableList title="Firma" items={D.firms} {...fO}/>
        <EditableList title="Şube" items={D.subs} {...sO}/>
        <EditableList title="Bölüm" items={D.bols} {...bO}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:20}}>
        <EditableList title="Görev" items={D.gorevler} {...gO}/>
        <EditableList title="Durum" items={D.durumlar} {...dO}/>
        <EditableList title="İzin Günü" items={D.izinGunleri} {...iO}/>
      </div>
      {/* OTOMATİK KAYIT BİLGİSİ */}
      <div style={{background:"#ecfdf5",borderRadius:12,padding:"18px 24px",border:"1.5px solid #86efac",marginBottom:20,display:"flex",alignItems:"flex-start",gap:14}}>
        <span style={{fontSize:28,flexShrink:0}}>✅</span>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:"#166534",marginBottom:6}}>Otomatik Kayıt Aktif — Tüm Tarayıcılar Senkron</div>
          <div style={{fontSize:13,color:"#15803d",lineHeight:1.7}}>Tüm değişiklikler anında <strong>data.json</strong> dosyasına otomatik kaydedilir. Chrome, Edge, Firefox — hangi tarayıcıyı kullanırsanız kullanın aynı veriyi görürsünüz.</div>
        </div>
      </div>
      {/* YEDEKLEME */}
      <div style={{background:C.card,borderRadius:12,padding:"20px 28px",border:"1px solid "+C.cardBrd,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:16,fontWeight:700}}>Yedekleme</div><div style={{fontSize:13,color:C.sec}}>Verilerinizi JSON olarak indirip başka bir tarayıcıya aktarabilirsiniz.</div></div>
          <div style={{display:"flex",gap:10}}>
            <Btn bg={C.tealDk} onClick={handleBackup}><IcDl/> Yedek İndir</Btn>
            <BtnO onClick={()=>fileRef.current?.click()}><IcUl/> Yedek Yükle</BtnO>
            <input ref={fileRef} type="file" accept=".json" onChange={handleRestore} style={{display:"none"}}/>
          </div>
        </div>
      </div>
    </div>;
  }

  /* RENDER */
  const renderPage=()=>{
    if(!can("gor"))return <div style={{background:C.card,borderRadius:12,padding:40,textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Erişim Engellendi</div><div style={{color:C.sec}}>Bu modüle erişim yetkiniz bulunmamaktadır.</div></div>;
    switch(page){case "dashboard":return <DashboardPage/>;case "puantaj":return <PuantajPage/>;case "personel":return <PersonelPage/>;case "avans":return <AvansPage/>;case "bordro":return <BordroPage/>;case "izin":return <IzinPage/>;case "tatil":return <TatilPage/>;case "log":return <LogPage/>;case "ayarlar":return <AyarlarPage/>;default:return <DashboardPage/>;}
  };

  return <div style={{display:"flex",height:"100vh",overflow:"hidden",background:C.bg}}>
    <aside style={{width:sideOpen?240:0,background:C.sidebar,display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden",transition:"width .25s ease",whiteSpace:"nowrap"}}>
      <div style={{padding:"20px 20px 12px",minWidth:240}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:22,fontStyle:"italic",color:"rgba(255,255,255,.7)",marginBottom:8}}>erdemCe</div>
        <span style={{display:"inline-block",padding:"4px 12px",borderRadius:6,background:C.teal,color:"#fff",fontSize:10,fontWeight:700,letterSpacing:".06em"}}>{"KULLANICI: "+curUser.name.toUpperCase()}</span>
        <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginTop:4}}>{curUser.role==="admin"?"Admin":curUser.role==="yonetici"?"Yönetici":"Kullanıcı"}</div>
      </div>
      <nav style={{flex:1,padding:"8px 12px",display:"flex",flexDirection:"column",gap:2,minWidth:240}}>
        {MENU.map(item=>{const active=page===item.key;const Ic=icMap[item.ic];const visible=curUser.role==="admin"||(curUser.perms&&curUser.perms[item.key]&&curUser.perms[item.key].gor);
          if(!visible)return null;
          return <button key={item.key} onClick={()=>{setPage(item.key);}} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderRadius:10,border:"none",cursor:"pointer",background:active?C.orange:"transparent",color:active?"#fff":C.sidebarText,fontSize:14,fontWeight:active?600:500,textAlign:"left",width:"100%"}}><Ic/><span>{item.label}</span></button>;
        })}
      </nav>
      <div style={{padding:"12px",minWidth:240}}>
        <button onClick={()=>setCurUser(null)} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"12px",borderRadius:10,border:"none",background:C.teal,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}><IcLogout/> Çıkış Yap</button>
      </div>
    </aside>
    <main style={{flex:1,overflow:"auto",padding:24,position:"relative"}} key={page}>
      <button onClick={()=>setSideOpen(!sideOpen)} style={{position:"fixed",top:12,left:sideOpen?248:8,zIndex:50,width:36,height:36,borderRadius:8,border:"none",background:sideOpen?"rgba(255,255,255,.9)":C.sidebar,color:sideOpen?C.sidebar:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,.15)",transition:"left .25s ease",fontSize:18,fontWeight:700}}>
        {sideOpen?"◀":"☰"}
      </button>
      {renderPage()}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
